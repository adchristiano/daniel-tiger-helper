<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel Tiger Helper</title>
    <meta name="description" content="Find the perfect Daniel Tiger episode for whatever your child is going through." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { background: #F7F4F0; }
      #root { min-height: 100vh; }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pawBounce {
        0%,100% { transform: translateY(0) rotate(-8deg); }
        33%     { transform: translateY(-6px) rotate(4deg); }
        66%     { transform: translateY(-3px) rotate(-4deg); }
      }
      @keyframes pawPulse {
        0%,100% { opacity: 0.35; transform: scale(1); }
        50%     { opacity: 1;    transform: scale(1.15); }
      }

      .fade-slide-up   { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) both; }
      .fade-slide-up-2 { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) 0.08s both; }
      .fade-slide-up-3 { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) 0.16s both; }
      .fade-slide-up-4 { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) 0.24s both; }
      .fade-slide-up-5 { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) 0.32s both; }
      .fade-in         { animation: fadeIn 0.3s ease both; }
      .paw-bounce      { animation: pawBounce 0.7s ease-in-out infinite; }
      .paw-pulse       { animation: pawPulse 1.1s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
